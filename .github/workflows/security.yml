# Security baseline CI: pip-audit + pytest + informative Semgrep.
# `packet/` is vendored refs for builder-os; excluded from pytest collection (see docs/security-ci.md).

name: Security baseline

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-python:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev]"

      # Ignore `packet/refs/*` symlinked workspaces that collide with pytest conftest namespaces.
      - name: Unit tests
        run: pytest --ignore=packet -q

      - name: pip-audit (installed env / editable deps)
        run: pip-audit

      # Optional SAST — non-blocking rollout week (arthor-ecosystem AC-4).
      - name: Semgrep OSS scan (informative)
        continue-on-error: true
        run: |
          python -m pip install semgrep
          semgrep scan --config p/default --quiet --error .
